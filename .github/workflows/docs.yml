name: Docs

on:
  push:
    branches: [main]

# Allow writing to gh-pages branch
permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version-file: .python-version

      - run: uv sync --dev

      - run: uv run mkdocs gh-deploy --force
